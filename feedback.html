<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Leave Feedback — Prime Visuals</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --primary: #0a0e27; --secondary: #141829; --tertiary: #1f2641;
  --accent: #00d9ff; --accent-dark: #00a8cc; --success: #00ff88;
  --warning: #ffaa00; --danger: #ff3366; --text: #f0f4ff;
  --text-dim: #a0aacf; --border: #2a2f4a;
}
body { font-family: 'Outfit', sans-serif; background: var(--primary); color: var(--text); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 2rem 1rem; }
body::before { content: ''; position: fixed; top: -50%; right: -20%; width: 600px; height: 600px; background: radial-gradient(circle, rgba(0,217,255,0.12) 0%, transparent 70%); border-radius: 50%; pointer-events: none; }
body::after { content: ''; position: fixed; bottom: -30%; left: -10%; width: 500px; height: 500px; background: radial-gradient(circle, rgba(0,255,136,0.08) 0%, transparent 70%); border-radius: 50%; pointer-events: none; }

.card { background: var(--secondary); border: 1px solid var(--border); border-radius: 20px; padding: 3rem 2.5rem; max-width: 520px; width: 100%; position: relative; z-index: 1; box-shadow: 0 40px 80px rgba(0,0,0,0.4); }

.brand { display: flex; align-items: center; gap: 0.75rem; margin-bottom: 2rem; }
.brand-logo { font-size: 1.4rem; font-weight: 800; background: linear-gradient(135deg, var(--accent), var(--success)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; letter-spacing: 2px; }
.brand-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--success); animation: pulse 2s ease-in-out infinite; }
@keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.5;transform:scale(1.3)} }

.card h1 { font-size: 1.8rem; font-weight: 800; margin-bottom: 0.5rem; }
.card h1 span { background: linear-gradient(135deg, var(--accent), var(--success)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
.card .subtitle { color: var(--text-dim); font-size: 0.95rem; margin-bottom: 2.5rem; line-height: 1.6; }

.form-group { margin-bottom: 1.4rem; }
.form-group label { display: block; margin-bottom: 0.5rem; font-weight: 600; font-size: 0.9rem; color: var(--text); }
.form-group label .req { color: var(--accent); margin-left: 2px; }
.form-group input, .form-group textarea { width: 100%; padding: 0.85rem 1rem; background: var(--tertiary); border: 1px solid var(--border); border-radius: 10px; color: var(--text); font-family: 'Outfit', sans-serif; font-size: 0.95rem; transition: border-color 0.3s, box-shadow 0.3s; }
.form-group input:focus, .form-group textarea:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(0,217,255,0.1); }
.form-group input::placeholder, .form-group textarea::placeholder { color: var(--text-dim); }
.form-group textarea { resize: vertical; min-height: 110px; }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }

/* STAR RATING */
.star-group { margin-bottom: 1.4rem; }
.star-group label { display: block; margin-bottom: 0.6rem; font-weight: 600; font-size: 0.9rem; }
.stars { display: flex; gap: 0.4rem; }
.stars span { font-size: 2rem; cursor: pointer; color: var(--border); transition: color 0.15s, transform 0.15s; line-height: 1; }
.stars span:hover { transform: scale(1.2); }
.stars span.filled { color: var(--warning); }
.star-hint { font-size: 0.8rem; color: var(--text-dim); margin-top: 0.4rem; height: 1.1rem; }

/* SUBMIT BTN */
.submit-btn { width: 100%; padding: 1rem; background: linear-gradient(135deg, var(--accent), var(--accent-dark)); color: var(--primary); border: none; border-radius: 10px; font-family: 'Outfit', sans-serif; font-size: 1rem; font-weight: 700; cursor: pointer; letter-spacing: 1px; text-transform: uppercase; transition: all 0.3s; margin-top: 0.5rem; }
.submit-btn:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(0,217,255,0.4); }
.submit-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

/* SUCCESS STATE */
.success-state { display: none; text-align: center; padding: 2rem 0; }
.success-icon { font-size: 4rem; margin-bottom: 1rem; }
.success-state h2 { font-size: 1.6rem; font-weight: 800; margin-bottom: 0.75rem; color: var(--success); }
.success-state p { color: var(--text-dim); line-height: 1.7; margin-bottom: 1.5rem; }
.back-btn { display: inline-block; padding: 0.8rem 2rem; background: var(--tertiary); border: 1px solid var(--border); border-radius: 8px; color: var(--accent); text-decoration: none; font-weight: 600; font-size: 0.9rem; transition: all 0.2s; }
.back-btn:hover { border-color: var(--accent); background: rgba(0,217,255,0.08); }

/* ERROR */
.field-error { color: var(--danger); font-size: 0.8rem; margin-top: 0.3rem; }
.form-error { background: rgba(255,51,102,0.1); border: 1px solid var(--danger); border-radius: 8px; padding: 0.75rem 1rem; color: var(--danger); font-size: 0.9rem; margin-bottom: 1rem; display: none; }

@media (max-width: 480px) {
  .card { padding: 2rem 1.5rem; }
  .form-row { grid-template-columns: 1fr; }
  .stars span { font-size: 1.8rem; }
}
</style>
</head>
<body>

<div class="card">
  <div class="brand">
    <div class="brand-logo">▶ Prime Visuals</div>
    <div class="brand-dot"></div>
  </div>

  <!-- FORM -->
  <div id="formSection">
    <h1>Share Your <span>Experience</span></h1>
    <p class="subtitle">We'd love to hear how we did! Your feedback helps us improve and inspires others.</p>

    <div id="formError" class="form-error"></div>

    <div class="form-row">
      <div class="form-group">
        <label>Your Name <span class="req">*</span></label>
        <input type="text" id="fbName" placeholder="John Doe" maxlength="60">
      </div>
      <div class="form-group">
        <label>Email <span class="req">*</span></label>
        <input type="email" id="fbEmail" placeholder="you@email.com">
      </div>
    </div>

    <div class="form-group">
      <label>Instagram / YouTube Handle</label>
      <input type="text" id="fbHandle" placeholder="@yourhandle" maxlength="60">
    </div>

    <div class="star-group">
      <label>Your Rating <span class="req">*</span></label>
      <div class="stars" id="starRow">
        <span onclick="pickStar(1)">★</span>
        <span onclick="pickStar(2)">★</span>
        <span onclick="pickStar(3)">★</span>
        <span onclick="pickStar(4)">★</span>
        <span onclick="pickStar(5)">★</span>
      </div>
      <div class="star-hint" id="starHint">Click to rate</div>
      <input type="hidden" id="fbRating" value="0">
    </div>

    <div class="form-group">
      <label>Your Review <span class="req">*</span></label>
      <textarea id="fbMessage" placeholder="Tell us about your experience working with Prime Visuals…" maxlength="800"></textarea>
    </div>

    <button class="submit-btn" id="submitBtn" onclick="submitFeedback()">Submit Feedback</button>
  </div>

  <!-- SUCCESS -->
  <div class="success-state" id="successSection">
    <div class="success-icon">🎉</div>
    <h2>Thank You!</h2>
    <p>Your feedback has been received.<br>We'll review it and publish it on our site soon.</p>
    <a href="index.html" class="back-btn">← Back to Portfolio</a>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";
import { FIREBASE_CONFIG } from './firebase-config.js';

const app = initializeApp(FIREBASE_CONFIG);
const db = getFirestore(app);
const $ = id => document.getElementById(id);

const starLabels = ['','😞 Poor','😐 Fair','🙂 Good','😊 Great','🤩 Excellent!'];

window.pickStar = function(n) {
  $('fbRating').value = n;
  document.querySelectorAll('#starRow span').forEach((s,i) => s.classList.toggle('filled', i < n));
  $('starHint').textContent = starLabels[n];
};

window.submitFeedback = async function() {
  const name    = $('fbName').value.trim();
  const email   = $('fbEmail').value.trim();
  const handle  = $('fbHandle').value.trim().replace(/^@/,'');
  const rating  = parseInt($('fbRating').value);
  const message = $('fbMessage').value.trim();
  const errBox  = $('formError');

  errBox.style.display = 'none';

  // Validate
  if (!name)             { showErr('Please enter your name.'); return; }
  if (!email || !email.includes('@')) { showErr('Please enter a valid email.'); return; }
  if (rating < 1)        { showErr('Please select a star rating.'); return; }
  if (message.length < 10) { showErr('Please write at least a short review (10+ characters).'); return; }

  const btn = $('submitBtn');
  btn.textContent = 'Submitting…'; btn.disabled = true;

  try {
    await addDoc(collection(db, 'feedback'), {
      name, email,
      handle: handle || null,
      rating, message,
      status: 'pending',
      createdAt: serverTimestamp()
    });
    $('formSection').style.display = 'none';
    $('successSection').style.display = 'block';
  } catch(e) {
    showErr('Something went wrong. Please try again.');
    btn.textContent = 'Submit Feedback'; btn.disabled = false;
  }
};

function showErr(msg) {
  const box = $('formError');
  box.textContent = '⚠️ ' + msg;
  box.style.display = 'block';
  box.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}
</script>
</body>
</html>
